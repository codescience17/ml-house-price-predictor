<!DOCTYPE html>
<html>

<head>
    <title>California House Predictor</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 50px;
        }

        input {
            display: block;
            margin-bottom: 10px;
            padding: 5px;
            width: 250px;
        }
    </style>
</head>

<body>
    <h2>California House Price Predictor</h2>

    <input type="number" id="MedInc" placeholder="Median Income (e.g. 3.8)">
    <input type="number" id="HouseAge" placeholder="House Age (e.g. 28)">
    <input type="number" id="AveRooms" placeholder="Avg Rooms (e.g. 5.4)">
    <input type="number" id="AveBedrms" placeholder="Avg Bedrooms (e.g. 1.1)">
    <input type="number" id="Population" placeholder="Population (e.g. 1400)">
    <input type="number" id="AveOccup" placeholder="Avg Occupancy (e.g. 3.0)">
    <input type="number" id="Latitude" placeholder="Latitude (e.g. 35.6)">
    <input type="number" id="Longitude" placeholder="Longitude (e.g. -119.5)">

    <button onclick="predict()">Get Estimated Price</button>

    <h3 id="result">Estimated Price: </h3>

    <script>
        async function predict() {
            const data = {
                MedInc: parseFloat(document.getElementById('MedInc').value),
                HouseAge: parseFloat(document.getElementById('HouseAge').value),
                AveRooms: parseFloat(document.getElementById('AveRooms').value),
                AveBedrms: parseFloat(document.getElementById('AveBedrms').value),
                Population: parseFloat(document.getElementById('Population').value),
                AveOccup: parseFloat(document.getElementById('AveOccup').value),
                Latitude: parseFloat(document.getElementById('Latitude').value),
                Longitude: parseFloat(document.getElementById('Longitude').value)
            };

            const response = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();

            // Convert model output (in 100k units) to actual dollars
            const price = result.predicted_price * 100000;
            document.getElementById('result').innerText = "Estimated Price: $" + price.toLocaleString();
        }
    </script>
</body>

</html>
